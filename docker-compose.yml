version: "3.9"

services:
  # ── PostgreSQL with pgvector ────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: proyectia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: proyectia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proyectia_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/proyectia
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src   # Hot reload in development

  # ── Adminer (optional DB UI) ─────────────────────────────────────────────
  adminer:
    image: adminer
    container_name: proyectia_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  postgres_data:
